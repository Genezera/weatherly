<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Weatherly</title>
    <meta
      name="description"
      content="Weather dashboard with city search (Open‑Meteo) and local cache."
    />
    <meta name="theme-color" content="#0B1220" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Weatherly" />
    <meta
      property="og:description"
      content="Weather dashboard with city search (Open‑Meteo) and local cache."
    />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Weatherly" />
    <meta
      name="twitter:description"
      content="Weather dashboard with city search (Open‑Meteo) and local cache."
    />

    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1'%3E%3Cstop stop-color='%236ee7ff'/%3E%3Cstop offset='1' stop-color='%23a78bfa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='%230b1220'/%3E%3Cpath d='M22 40a10 10 0 0 1 9-14 9 9 0 0 1 17 3 7 7 0 0 1 0 14H22z' fill='url(%23g)' opacity='0.95'/%3E%3Cpath d='M18 44c4 0 6-2 8-2s4 2 8 2 6-2 8-2 4 2 8 2' stroke='%23e6edf7' stroke-width='3' fill='none' opacity='0.25'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <header class="top">
      <div class="container top__inner">
        <div>
          <a class="back" href="./README.md">README</a>
          <h1 class="title">Weatherly</h1>
          <p class="subtitle">Open‑Meteo • Search • Forecast • Cache</p>
        </div>
      </div>

      <div class="container search">
        <form class="search__form" data-search-form>
          <label class="field">
            <span class="field__label">City</span>
            <input
              class="field__input"
              name="q"
              placeholder='e.g. "New York", "London", "Tokyo"...'
              autocomplete="off"
              aria-autocomplete="list"
              aria-controls="suggestions"
              aria-expanded="false"
              required
              spellcheck="false"
              data-q
            />
          </label>
          <button class="btn btn--primary" type="submit">Search</button>
          <button class="btn btn--ghost" type="button" data-use-location>
            Use my location
          </button>
        </form>
        <div
          class="suggestions"
          id="suggestions"
          role="listbox"
          aria-label="Suggestions"
          hidden
          data-suggestions
        ></div>
      </div>
    </header>

    <main class="container">
      <section class="grid" aria-label="Weather">
        <article class="card" aria-label="Current">
          <header class="card__header">
            <h2 class="card__title">Now</h2>
            <span class="pill" data-now-place>—</span>
          </header>
          <div class="now" data-now>
            <div class="now__temp" data-now-temp>—</div>
            <div class="now__meta">
              <div class="muted" data-now-desc>—</div>
              <div class="now__stats" data-now-stats></div>
            </div>
          </div>
          <div class="hint muted small" data-now-hint></div>
        </article>

        <article class="card" aria-label="Forecast">
          <header class="card__header">
            <h2 class="card__title">7 days</h2>
            <span class="pill" data-updated>—</span>
          </header>
          <div class="forecast" data-forecast></div>
        </article>
      </section>

      <section class="section">
        <header class="section__header">
          <h2 class="section__title">Recents</h2>
          <button class="btn btn--ghost" type="button" data-clear-recent>
            Clear
          </button>
        </header>
        <div class="recent" data-recent></div>
      </section>
    </main>

    <div class="toast" role="status" aria-live="polite" aria-atomic="true" hidden data-toast></div>
  </body>
</html>
